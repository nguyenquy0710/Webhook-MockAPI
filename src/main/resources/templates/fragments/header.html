<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

  <head th:fragment="head(title)">
    <!-- SEO Meta Tags -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>WebHookMock - Webhook Testing Made Simple | QuyIT Platform</title>
    <meta name="description"
      content="WebHookMock is a powerful webhook testing tool that allows developers to create, manage, and test webhook APIs with ease. Part of QuyIT Platform tools suite.">
    <meta name="keywords" content="webhook, testing, mock, api, spring boot, java, automation, developer tools">
    <meta name="author" content="nchuyen128@gmail.com">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://mock-api.quyit.id.vn/">
    <meta property="og:title" content="WebHookMock - Webhook Testing Made Simple">
    <meta property="og:description"
      content="Create custom API endpoints, monitor requests in real-time, and configure responses with this powerful webhook testing tool.">
    <meta property="og:image" content="https://autobot-161.s3.ap-southeast-1.amazonaws.com/logo-webhook.png">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://mock-api.quyit.id.vn/">
    <meta property="twitter:title" content="WebHookMock - Webhook Testing Made Simple">
    <meta property="twitter:description"
      content="Create custom API endpoints, monitor requests in real-time, and configure responses with this powerful webhook testing tool.">
    <meta property="twitter:image" content="https://autobot-161.s3.ap-southeast-1.amazonaws.com/logo-webhook.png">

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="https://autobot-161.s3.ap-southeast-1.amazonaws.com/logo-webhook.png">
    <link rel="apple-touch-icon" sizes="180x180" href="https://autobot-161.s3.ap-southeast-1.amazonaws.com/logo-webhook.png">

     <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">

    <!-- Bootstrap Bundle JS (đã gồm Popper.js) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet" crossorigin="anonymous">

    <!-- DataTables CSS for Bootstrap 5 -->
    <link href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link th:href="@{/css/styles.css}" rel="stylesheet">
    <link th:href="@{/css/copy-wrapper.css}" rel="stylesheet">
    
    <style>
      /* Make dropdown show on hover */
      .dropdown:hover .dropdown-menu {
        display: block;
      }
      
      /* Smooth transition for dropdown */
      .dropdown-menu {
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.15s ease-in-out, visibility 0.15s ease-in-out;
      }
      
      .dropdown:hover .dropdown-menu {
        opacity: 1;
        visibility: visible;
      }
      
      /* Keep dropdown visible when hovering over menu items */
      .dropdown:hover .dropdown-menu.show {
        display: block;
      }
    </style>

    <!-- Custom JS -->
    <script th:src="@{/js/copy-wrapper.js}"></script>
  </head>

  <body>
    <script>
      // Enable dropdown on hover
      document.addEventListener('DOMContentLoaded', function() {
        const dropdown = document.querySelector('.dropdown');
        if (dropdown) {
          const toggle = dropdown.querySelector('[data-bs-toggle="dropdown"]');
          const menu = dropdown.querySelector('.dropdown-menu');
          
          if (toggle && menu) {
            let timeout;
            
            // Show dropdown on mouseenter
            dropdown.addEventListener('mouseenter', function() {
              clearTimeout(timeout);
              toggle.classList.add('show');
              menu.classList.add('show');
              toggle.setAttribute('aria-expanded', 'true');
            });
            
            // Hide dropdown on mouseleave with delay
            dropdown.addEventListener('mouseleave', function() {
              timeout = setTimeout(function() {
                toggle.classList.remove('show');
                menu.classList.remove('show');
                toggle.setAttribute('aria-expanded', 'false');
              }, 150);
            });
          }
        }
      });
    </script>
    <header th:fragment="header" class="bg-dark text-white py-4 mb-4 shadow">
      <div class="container">
        <div class="d-flex flex-wrap align-items-center justify-content-between">
          <a href="/" class="d-flex align-items-center text-white text-decoration-none">
            <i class="fas fa-webhook fa-2x me-3 text-primary"></i>
            <span class="fs-3 fw-bold">Mock Webhook</span>
          </a>
          <div class="text-end" th:if="${#authentication != null && !#authentication.principal.equals('anonymousUser')}">
            <div class="dropdown">
              <button class="btn btn-outline-light dropdown-toggle rounded-pill px-3" type="button" id="userDropdown" data-bs-toggle="dropdown"
                aria-expanded="false">
                <i class="fas fa-user me-2"></i>
                <span th:text="${username}">Username</span>
              </button>
              <ul class="dropdown-menu dropdown-menu-end shadow border-0" aria-labelledby="userDropdown">
                <li><a class="dropdown-item" th:href="@{/dashboard}"><i class="fas fa-home me-2 text-primary"></i> Dashboard</a></li>
                <li><a class="dropdown-item" th:href="@{/api-configs}"><i class="fas fa-cogs me-2 text-success"></i> API Configs</a></li>
                <li><a class="dropdown-item" th:href="@{|/view/@${username}|}"><i class="fas fa-history me-2 text-info"></i> Request Logs</a></li>
                <li><a class="dropdown-item" th:href="@{|/swagger/@${username}|}" target="_blank"><i class="fas fa-book me-2 text-warning"></i>
                    Swagger</a></li>
                <li><a class="dropdown-item" th:href="@{/change-password}"><i class="fas fa-key me-2 text-info"></i> Change Password</a></li>
                <li sec:authorize="hasRole('ADMIN')"><a class="dropdown-item" th:href="@{/admin/users}"><i class="fas fa-users-cog me-2 text-danger"></i> Admin</a></li>
                <li>
                  <hr class="dropdown-divider">
                </li>
                <li>
                  <form th:action="@{/logout}" method="post">
                    <button class="dropdown-item text-danger" type="submit">
                      <i class="fas fa-sign-out-alt me-2"></i>Logout
                    </button>
                  </form>
                </li>
              </ul>
            </div>
          </div>
        </div>
      </div>
    </header>
  </body>

</html>
